# Admin role template
# Full access within scope (namespace or cluster)
---
kind: {{ROLE_KIND}}
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{USERNAME}}-admin
  {{NAMESPACE_BLOCK}}
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
kind: {{BINDING_KIND}}
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{USERNAME}}-admin-binding
  {{NAMESPACE_BLOCK}}
subjects:
- kind: ServiceAccount
  name: {{USERNAME}}
  namespace: {{SA_NAMESPACE}}
roleRef:
  kind: {{ROLE_KIND}}
  name: {{USERNAME}}-admin
  apiGroup: rbac.authorization.k8s.io
