# Operator role template
# Developer + infra workloads CRUD + node/PV read-only
---
kind: {{ROLE_KIND}}
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{USERNAME}}-operator
  {{NAMESPACE_BLOCK}}
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/exec", "pods/portforward",
              "services", "configmaps", "secrets", "persistentvolumeclaims",
              "endpoints", "events", "replicationcontrollers",
              "serviceaccounts"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["namespaces", "nodes", "persistentvolumes", "resourcequotas", "limitranges"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "daemonsets", "statefulsets", "replicasets", "controllerrevisions"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["policy"]
  resources: ["poddisruptionbudgets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings"]
  verbs: ["get", "list", "watch"]
---
kind: {{BINDING_KIND}}
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{USERNAME}}-operator-binding
  {{NAMESPACE_BLOCK}}
subjects:
- kind: ServiceAccount
  name: {{USERNAME}}
  namespace: {{SA_NAMESPACE}}
roleRef:
  kind: {{ROLE_KIND}}
  name: {{USERNAME}}-operator
  apiGroup: rbac.authorization.k8s.io
