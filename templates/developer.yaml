# Developer role template
# Full CRUD on application workloads, read on infra resources
---
kind: {{ROLE_KIND}}
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{USERNAME}}-developer
  {{NAMESPACE_BLOCK}}
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/exec", "pods/portforward",
              "services", "configmaps", "secrets", "persistentvolumeclaims",
              "endpoints", "events"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["namespaces", "nodes", "resourcequotas", "limitranges"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
kind: {{BINDING_KIND}}
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{USERNAME}}-developer-binding
  {{NAMESPACE_BLOCK}}
subjects:
- kind: ServiceAccount
  name: {{USERNAME}}
  namespace: {{SA_NAMESPACE}}
roleRef:
  kind: {{ROLE_KIND}}
  name: {{USERNAME}}-developer
  apiGroup: rbac.authorization.k8s.io
