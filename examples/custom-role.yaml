# Custom RBAC example: CI/CD pipeline service account
# This YAML will be applied directly via kubectl apply
# Make sure the ServiceAccount name matches the -u parameter
#
# Usage:
#   ./kubeconfig-gen.sh -u cicd-bot -n default -c custom-role.yaml

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cicd-bot
  namespace: default
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cicd-bot-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: cicd-bot
  namespace: default
roleRef:
  kind: Role
  name: cicd-bot
  apiGroup: rbac.authorization.k8s.io
